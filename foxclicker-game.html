<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦊 FoxyBird — Vole, Renard !</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #FF6B1A;
    --amber: #FFB347;
    --dark: #0D0800;
    --deep: #1A0F00;
    --bark: #3D2200;
    --mid: #5C3300;
    --gold: #FFD700;
    --cream: #FFF3E0;
    --text: #FFE0B2;
    --glow: rgba(255,107,26,0.5);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--dark);
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 24px;
    background: rgba(13,8,0,0.97);
    border-bottom: 2px solid var(--orange);
    box-shadow: 0 2px 20px var(--glow);
    flex-shrink: 0; z-index: 100;
  }
  .nav-logo { font-family: 'Cinzel Decorative', serif; font-size: 1.2rem; color: var(--orange); text-decoration: none; text-shadow: 0 0 15px var(--glow); }
  .nav-links { display: flex; gap: 4px; }
  .nav-links a { color: var(--amber); text-decoration: none; font-weight: 700; font-size: 0.8rem; padding: 6px 12px; border-radius: 16px; transition: all 0.2s; border: 1px solid transparent; }
  .nav-links a:hover { border-color: var(--amber); background: rgba(255,179,71,0.1); }
  .nav-links a.active { background: rgba(255,107,26,0.2); border-color: var(--orange); color: var(--gold); }

  .game-wrapper {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    background: linear-gradient(180deg, #080d18 0%, #12203a 45%, #2d1800 100%);
  }

  canvas {
    display: block;
    border-radius: 14px;
    box-shadow: 0 0 60px rgba(255,107,26,0.25), 0 20px 80px rgba(0,0,0,0.7);
    border: 2px solid rgba(255,107,26,0.25);
    cursor: pointer;
  }

  .score-hud {
    position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
    font-family: 'Cinzel Decorative', serif;
    font-size: 2.4rem; color: white;
    text-shadow: 0 0 25px rgba(255,107,26,0.9), 0 3px 0 rgba(0,0,0,0.7);
    pointer-events: none; z-index: 10; letter-spacing: 3px;
  }
  .best-hud {
    position: absolute; top: 14px; right: 18px;
    font-size: 0.82rem; font-weight: 800; color: var(--gold);
    text-shadow: 0 2px 6px rgba(0,0,0,0.7);
    pointer-events: none; z-index: 10;
    background: rgba(0,0,0,0.35); padding: 5px 12px;
    border-radius: 14px; border: 1px solid rgba(255,215,0,0.3);
  }

  /* OVERLAYS */
  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
    background: rgba(8,13,24,0.85); backdrop-filter: blur(5px);
    z-index: 20; border-radius: 12px;
  }
  .overlay.hidden { display: none; }

  .ov-fox { font-size: 5rem; animation: foxFloat 2.5s ease-in-out infinite; filter: drop-shadow(0 0 24px rgba(255,107,26,0.7)); }
  @keyframes foxFloat { 0%,100%{transform:translateY(0)rotate(-6deg)} 50%{transform:translateY(-18px)rotate(6deg)} }

  .ov-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.5rem, 4vw, 2.4rem);
    color: var(--orange); text-shadow: 0 0 30px var(--glow); text-align: center;
  }
  .ov-sub { color: var(--amber); font-weight: 700; font-size: 0.9rem; text-align: center; line-height: 1.5; }

  .play-btn {
    background: linear-gradient(135deg, var(--orange), #CC4400);
    border: 2px solid var(--amber); border-radius: 50px;
    color: white; font-family: 'Nunito', sans-serif;
    font-weight: 900; font-size: 1.15rem; padding: 13px 42px;
    cursor: pointer;
    box-shadow: 0 0 28px var(--glow), 0 6px 20px rgba(0,0,0,0.4);
    transition: all 0.2s;
  }
  .play-btn:hover { transform: scale(1.06); box-shadow: 0 0 45px var(--glow); }

  .scoreboard {
    background: linear-gradient(135deg, rgba(61,34,0,0.92), rgba(26,15,0,0.92));
    border: 1px solid var(--amber); border-radius: 18px;
    padding: 18px 40px; text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  .sb-medal { font-size: 2.2rem; display:block; margin-bottom:2px; }
  .sb-label { font-size: 0.7rem; color: var(--amber); text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }
  .sb-val { font-family: 'Cinzel Decorative', serif; font-size: 2.6rem; color: var(--gold); text-shadow: 0 0 15px rgba(255,215,0,0.5); display:block; line-height:1.1; }
  .sb-best { font-size: 0.82rem; color: var(--amber); font-weight: 700; margin-top: 3px; display:block; }

  .diff-row { display: flex; gap: 7px; }
  .diff-btn {
    padding: 7px 18px; border-radius: 22px; border: 1px solid var(--bark);
    background: transparent; color: var(--amber);
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.78rem;
    cursor: pointer; transition: all 0.2s;
  }
  .diff-btn.active { background: var(--orange); border-color: var(--amber); color: white; }
  .diff-btn:hover:not(.active) { border-color: var(--amber); }
  .hint-txt { font-size: 0.7rem; color: var(--mid); margin-top: -4px; }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">🦊 FoxClicker</a>
  <div class="nav-links">
    <a href="index.html">Accueil</a>
    <a href="game.html" class="active">▶ Jeu</a>
    <a href="leaderboard.html">🏆 Classement</a>
    <a href="about.html">À propos</a>
  </div>
</nav>

<div class="game-wrapper" id="gw">
  <canvas id="c"></canvas>
  <div class="score-hud" id="score-hud"></div>
  <div class="best-hud" id="best-hud">🏆 0</div>

  <!-- START -->
  <div class="overlay" id="ov-start">
    <div class="ov-fox">🦊</div>
    <div class="ov-title">Foxy Bird</div>
    <div class="ov-sub">Vole à travers la forêt enchantée !<br>Évite les arbres… bonne chance 🍀</div>
    <div class="diff-row">
      <button class="diff-btn active" onclick="setDiff('easy',this)">🌿 Facile</button>
      <button class="diff-btn" onclick="setDiff('normal',this)">🌲 Normal</button>
      <button class="diff-btn" onclick="setDiff('hard',this)">🔥 Difficile</button>
    </div>
    <button class="play-btn" onclick="startGame()">▶ Jouer !</button>
    <div class="hint-txt">Espace · Clic · Toucher pour voler</div>
  </div>

  <!-- GAME OVER -->
  <div class="overlay hidden" id="ov-over">
    <div style="font-size:3rem">💥</div>
    <div class="ov-title" style="font-size:1.6rem">Aïe !</div>
    <div class="scoreboard">
      <span class="sb-medal" id="sb-medal">🥉</span>
      <span class="sb-label">Score</span>
      <span class="sb-val" id="sb-val">0</span>
      <span class="sb-best" id="sb-best">Meilleur : 0</span>
    </div>
    <button class="play-btn" onclick="startGame()">🔄 Rejouer</button>
    <div class="hint-txt">ou appuie sur Espace</div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, GROUND_H, PIPE_GAP;

function resize() {
  const gw = document.getElementById('gw');
  const navH = document.querySelector('nav').offsetHeight;
  const aw = gw.clientWidth - 32;
  const ah = window.innerHeight - navH - 32;
  const ratio = 9/16;
  let cw = Math.min(aw, ah * ratio, 400);
  let ch = cw / ratio;
  if (ch > ah) { ch = ah; cw = ch * ratio; }
  W = canvas.width = Math.floor(cw);
  H = canvas.height = Math.floor(ch);
  GROUND_H = Math.floor(H * 0.1);
  PIPE_GAP = H * 0.27;
}
window.addEventListener('resize', () => { resize(); if (gameState !== 'playing') drawScene(); });

// ─── DIFFICULTY ─────────────────────────────────────────
const DIFFS = {
  easy:   { grav: 0.30, jump: -6.2, speed: 2.2, interval: 105 },
  normal: { grav: 0.40, jump: -7.2, speed: 3.0, interval: 88  },
  hard:   { grav: 0.52, jump: -8.4, speed: 4.0, interval: 70  },
};
let diff = 'easy';
function setDiff(d, btn) {
  diff = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ─── STATE ───────────────────────────────────────────────
let gameState = 'idle';
let score = 0, best = 0;
let raf = null;

// ─── FOX ────────────────────────────────────────────────
let fx, fy, fvy, frot, fwing;

// ─── PIPES ──────────────────────────────────────────────
let pipes = [];
let pipeTimer = 0;

// ─── GROUND SCROLL ──────────────────────────────────────
let gx = 0;

// ─── CLOUDS ─────────────────────────────────────────────
let clouds = [];

// ─── PARTICLES ──────────────────────────────────────────
let parts = [];
function spawnParts(x, y) {
  const em = ['🍃','✨','🫐','🌿','🦊'];
  for (let i = 0; i < 7; i++) {
    const a = Math.random() * Math.PI * 2, spd = 2 + Math.random() * 3;
    parts.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd-2, life:1, e:em[Math.floor(Math.random()*em.length)] });
  }
}

// ─── DRAW HELPERS ───────────────────────────────────────
function drawBg() {
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#06101e');
  g.addColorStop(0.45,'#10243a');
  g.addColorStop(0.82,'#2d1800');
  g.addColorStop(1,'#180c00');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}

function drawMoon() {
  const mx=W*0.84, my=H*0.1;
  // outer glow
  const gg=ctx.createRadialGradient(mx,my,8,mx,my,W*0.14);
  gg.addColorStop(0,'rgba(255,215,0,0.22)'); gg.addColorStop(1,'transparent');
  ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(mx,my,W*0.14,0,Math.PI*2); ctx.fill();
  // moon disc
  const mg=ctx.createRadialGradient(mx-W*0.02,my-H*0.03,2,mx,my,W*0.065);
  mg.addColorStop(0,'#FFFDE0'); mg.addColorStop(0.5,'#FFD700'); mg.addColorStop(1,'#BB8800');
  ctx.fillStyle=mg; ctx.beginPath(); ctx.arc(mx,my,W*0.065,0,Math.PI*2); ctx.fill();
}

function drawStars() {
  const pts=[[0.05,0.07],[0.13,0.2],[0.28,0.05],[0.45,0.14],[0.6,0.04],[0.7,0.22],[0.2,0.32],[0.5,0.26],[0.78,0.12],[0.38,0.38],[0.9,0.08],[0.55,0.44]];
  pts.forEach(([rx,ry]) => {
    const t=Date.now()/1000;
    const alpha=0.35+0.45*Math.sin(t*2.3+rx*18);
    ctx.save(); ctx.globalAlpha=alpha;
    ctx.fillStyle='#FFD700'; ctx.beginPath();
    ctx.arc(rx*W, ry*H*0.62, 1.4,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

function drawClouds() {
  clouds.forEach(cl => {
    ctx.save(); ctx.globalAlpha=0.1; ctx.fillStyle='#FFE0B2';
    const cw=W*0.18*cl.s, ch=H*0.04*cl.s;
    ctx.beginPath(); ctx.ellipse(cl.x,cl.y,cw,ch,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cl.x-cw*0.35,cl.y+ch*0.3,cw*0.6,ch*0.7,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cl.x+cw*0.38,cl.y+ch*0.4,cw*0.55,ch*0.65,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

function drawGround() {
  const gy=H-GROUND_H;
  const g=ctx.createLinearGradient(0,gy,0,H);
  g.addColorStop(0,'#3D6328'); g.addColorStop(0.3,'#2E4A1E'); g.addColorStop(1,'#180c00');
  ctx.fillStyle=g; ctx.fillRect(0,gy,W,GROUND_H);
  ctx.strokeStyle='#5C8A3A'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke();
  ctx.fillStyle='#4a7a30';
  for(let i=0;i<W;i+=14){
    const x=((i+gx)%W); if(x<0||x>W) continue;
    ctx.beginPath(); ctx.ellipse(x,gy,7,4,0,0,Math.PI*2); ctx.fill();
  }
}

function drawPipe(px, topH, botY) {
  const pw = W*0.14;
  const trW = pw*0.25;
  const layers = 3;
  const gh = H-GROUND_H;

  // ── TOP TREE ──────────────────────────────────
  // Trunk
  ctx.fillStyle='#5C3300';
  ctx.fillRect(px-trW/2, 0, trW, topH - pw*0.65);
  // Foliage (pointing DOWN from bottom of top pipe)
  for(let i=0;i<layers;i++){
    const prog=i/(layers-1);
    const lw=pw*(0.55+prog*0.45);
    const ly=topH-pw*0.65-(layers-1-i)*(pw*0.28);
    ctx.fillStyle=`hsl(${112+i*7},${48+i*6}%,${20+i*5}%)`;
    ctx.beginPath();
    ctx.moveTo(px,ly+lw*0.55);
    ctx.lineTo(px+lw,ly-pw*0.28);
    ctx.lineTo(px-lw,ly-pw*0.28);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle=`hsl(${112+i*7},55%,32%)`; ctx.lineWidth=1; ctx.stroke();
  }

  // ── BOTTOM TREE ──────────────────────────────
  // Trunk
  ctx.fillStyle='#5C3300';
  ctx.fillRect(px-trW/2, botY+pw*0.65, trW, gh-botY-pw*0.65);
  // Foliage (pointing UP from top of bottom pipe)
  for(let i=layers-1;i>=0;i--){
    const prog=(layers-1-i)/(layers-1);
    const lw=pw*(0.55+prog*0.45);
    const ly=botY+(layers-1-i)*(pw*0.28);
    ctx.fillStyle=`hsl(${112+(layers-1-i)*7},${48+(layers-1-i)*6}%,${20+(layers-1-i)*5}%)`;
    ctx.beginPath();
    ctx.moveTo(px,ly-lw*0.55);
    ctx.lineTo(px+lw,ly+pw*0.28);
    ctx.lineTo(px-lw,ly+pw*0.28);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle=`hsl(${112+(layers-1-i)*7},55%,32%)`; ctx.lineWidth=1; ctx.stroke();
  }

  // Gap glow
  ctx.save();
  ctx.globalAlpha=0.12;
  ctx.fillStyle='#88FF55';
  ctx.fillRect(px-pw*0.55,topH-3,pw*1.1,3);
  ctx.fillRect(px-pw*0.55,botY,pw*1.1,3);
  ctx.restore();
}

function drawFox(x,y,rot,wing) {
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
  const r=W*0.056;

  // glow
  const gg=ctx.createRadialGradient(0,0,r*0.2,0,0,r*2);
  gg.addColorStop(0,'rgba(255,107,26,0.18)'); gg.addColorStop(1,'transparent');
  ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(0,0,r*2,0,Math.PI*2); ctx.fill();

  // tail
  ctx.save();
  ctx.translate(-r*0.55,r*0.1);
  ctx.rotate(Math.sin(wing)*0.35);
  ctx.fillStyle='#FF6B1A';
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.quadraticCurveTo(-r*1.35,-r*0.5,-r*1.75,r*0.8);
  ctx.quadraticCurveTo(-r*1.0,r*0.55,0,r*0.3);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle='#FFF3E0';
  ctx.beginPath(); ctx.ellipse(-r*1.55,r*0.55,r*0.32,r*0.22,-0.4,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // body
  const bg=ctx.createRadialGradient(-r*0.2,-r*0.2,r*0.1,0,0,r);
  bg.addColorStop(0,'#FF9043'); bg.addColorStop(0.6,'#FF6B1A'); bg.addColorStop(1,'#CC4400');
  ctx.fillStyle=bg;
  ctx.beginPath(); ctx.ellipse(0,0,r,r*0.8,0,0,Math.PI*2); ctx.fill();

  // belly
  ctx.fillStyle='#FFF3E0';
  ctx.beginPath(); ctx.ellipse(r*0.15,r*0.15,r*0.42,r*0.36,0.2,0,Math.PI*2); ctx.fill();

  // wing flap
  ctx.save();
  ctx.translate(0,r*0.1);
  ctx.rotate(-Math.PI/6+Math.sin(wing*3)*0.55);
  ctx.fillStyle='#FF8030';
  ctx.beginPath(); ctx.ellipse(0,-r*0.48,r*0.22,r*0.6,0.2,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // head
  ctx.fillStyle='#FF6B1A';
  ctx.beginPath(); ctx.arc(r*0.54,-r*0.3,r*0.52,0,Math.PI*2); ctx.fill();

  // muzzle
  ctx.fillStyle='#FFF3E0';
  ctx.beginPath(); ctx.ellipse(r*0.74,-r*0.15,r*0.27,r*0.21,0.3,0,Math.PI*2); ctx.fill();

  // ears
  const earPts=[[0.4,-0.72,0.25,-1.14,0.64,-0.78],[0.71,-0.65,0.64,-1.04,0.94,-0.72]];
  ctx.fillStyle='#FF6B1A';
  earPts.forEach(([x1,y1,x2,y2,x3,y3])=>{
    ctx.beginPath(); ctx.moveTo(x1*r,y1*r); ctx.lineTo(x2*r,y2*r); ctx.lineTo(x3*r,y3*r); ctx.closePath(); ctx.fill();
  });
  const iearPts=[[0.43,-0.78,0.32,-1.04,0.59,-0.82]];
  ctx.fillStyle='#FFB347';
  iearPts.forEach(([x1,y1,x2,y2,x3,y3])=>{
    ctx.beginPath(); ctx.moveTo(x1*r,y1*r); ctx.lineTo(x2*r,y2*r); ctx.lineTo(x3*r,y3*r); ctx.closePath(); ctx.fill();
  });

  // eye
  ctx.fillStyle='#150800';
  ctx.beginPath(); ctx.arc(r*0.71,-r*0.38,r*0.1,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white';
  ctx.beginPath(); ctx.arc(r*0.74,-r*0.42,r*0.04,0,Math.PI*2); ctx.fill();

  // nose
  ctx.fillStyle='#150800';
  ctx.beginPath(); ctx.arc(r*0.91,-r*0.18,r*0.065,0,Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawParts() {
  parts.forEach(p=>{
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.font=`${(12*p.life+5)}px serif`; ctx.textAlign='center';
    ctx.fillText(p.e,p.x,p.y);
    ctx.restore();
  });
}

// ─── GAME LOGIC ──────────────────────────────────────────
function startGame() {
  document.getElementById('ov-start').classList.add('hidden');
  document.getElementById('ov-over').classList.add('hidden');
  const d=DIFFS[diff];
  fx=W*0.25; fy=H*0.45; fvy=0; frot=0; fwing=0;
  pipes=[]; pipeTimer=0; parts=[]; gx=0; score=0;
  clouds=[
    {x:W*0.2, y:H*0.12, s:1.0},
    {x:W*0.55, y:H*0.08, s:0.8},
    {x:W*0.82, y:H*0.18, s:1.1},
  ];
  document.getElementById('score-hud').textContent='0';
  gameState='playing';
  cancelAnimationFrame(raf);
  loop();
}

function jump() {
  if(gameState==='idle'||gameState==='dead') { startGame(); return; }
  if(gameState==='playing'){
    fvy=DIFFS[diff].jump;
    fwing+=Math.PI;
    spawnParts(fx-W*0.04,fy);
  }
}

document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();jump();}
});
canvas.addEventListener('click',jump);
canvas.addEventListener('touchstart',e=>{e.preventDefault();jump();},{passive:false});

function loop() {
  update();
  drawScene();
  if(gameState==='playing') raf=requestAnimationFrame(loop);
}

function update() {
  const d=DIFFS[diff];
  fvy+=d.grav; fy+=fvy;
  frot=Math.min(Math.max(fvy*0.065,-0.5),1.25);
  fwing+=0.09;

  const groundY=H-GROUND_H;
  if(fy+W*0.056>groundY){die();return;}
  if(fy-W*0.056<0){fy=W*0.056;fvy=0;}

  // clouds
  clouds.forEach(cl=>{
    cl.x-=d.speed*0.35;
    if(cl.x<-W*0.25) cl.x=W+W*0.25;
  });

  // ground
  gx=(gx-d.speed*1.4)%14;

  // pipes
  pipeTimer++;
  if(pipeTimer>=d.interval){
    pipeTimer=0;
    const minT=H*0.1, maxT=H-GROUND_H-PIPE_GAP-H*0.1;
    const topH=minT+Math.random()*(maxT-minT);
    pipes.push({x:W+W*0.08,topH,botY:topH+PIPE_GAP,passed:false});
  }
  const pw=W*0.14;
  const fr=W*0.056*0.72;
  pipes.forEach(p=>{
    p.x-=d.speed;
    if(!p.passed && p.x+pw<fx){
      p.passed=true; score++;
      document.getElementById('score-hud').textContent=score;
      if(score>best){best=score; document.getElementById('best-hud').textContent='🏆 '+best;}
    }
    if(fx+fr>p.x-pw && fx-fr<p.x+pw){
      if(fy-fr<p.topH||fy+fr>p.botY){die();return;}
    }
  });
  pipes=pipes.filter(p=>p.x>-pw*2);

  // particles
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.life-=0.035;});
  parts=parts.filter(p=>p.life>0);
}

function die() {
  gameState='dead';
  spawnParts(fx,fy);
  if(score>best) best=score;
  // draw crash particles then show overlay
  drawScene();
  setTimeout(()=>{
    const medal=score>=30?'🥇':score>=15?'🥈':score>=5?'🥉':'💀';
    document.getElementById('sb-medal').textContent=medal;
    document.getElementById('sb-val').textContent=score;
    document.getElementById('sb-best').textContent='Meilleur : '+best;
    document.getElementById('score-hud').textContent='';
    document.getElementById('ov-over').classList.remove('hidden');
  },550);
}

function drawScene() {
  ctx.clearRect(0,0,W,H);
  drawBg(); drawStars(); drawMoon(); drawClouds();
  pipes.forEach(p=>drawPipe(p.x,p.topH,p.botY));
  drawGround();
  drawParts();
  drawFox(fx,fy,frot,fwing);
}

// ─── IDLE ANIMATION ──────────────────────────────────────
function idleLoop(ts) {
  if(gameState!=='idle') return;
  fx=W*0.25;
  fy=H*0.45+Math.sin(ts/700)*H*0.025;
  frot=Math.sin(ts/700)*0.15;
  fwing=ts/250;
  drawScene();
  requestAnimationFrame(idleLoop);
}

resize();
fx=W*0.25; fy=H*0.45; fvy=0; frot=0; fwing=0;
clouds=[{x:W*0.2,y:H*0.12,s:1},{x:W*0.55,y:H*0.08,s:0.8},{x:W*0.82,y:H*0.18,s:1.1}];
requestAnimationFrame(idleLoop);
</script>
</body>
