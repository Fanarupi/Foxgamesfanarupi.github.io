<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦊 FoxClicker — Classement</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #FF6B1A; --amber: #FFB347; --dark: #0D0800; --deep: #1A0F00;
    --bark: #3D2200; --mid: #5C3300; --gold: #FFD700; --cream: #FFF3E0;
    --text: #FFE0B2; --glow: rgba(255,107,26,0.5);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); font-family: 'Nunito', sans-serif; color: var(--text); min-height: 100vh; }
  .stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: radial-gradient(1px 1px at 15% 20%, rgba(255,215,0,0.7), transparent), radial-gradient(1px 1px at 75% 15%, rgba(255,179,71,0.6), transparent), radial-gradient(1.5px 1.5px at 45% 55%, rgba(255,107,26,0.5), transparent), radial-gradient(1px 1px at 85% 70%, rgba(255,215,0,0.6), transparent), radial-gradient(1px 1px at 25% 80%, rgba(255,179,71,0.5), transparent);
    background-size: 300px 300px; animation: twinkle 7s ease-in-out infinite alternate;
  }
  @keyframes twinkle { 0%{opacity:0.5} 100%{opacity:0.9} }
  nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 40px;
    background: rgba(13,8,0,0.92); backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,107,26,0.25);
  }
  .nav-logo { font-family: 'Cinzel Decorative', serif; font-size: 1.3rem; color: var(--orange); text-decoration: none; text-shadow: 0 0 15px var(--glow); }
  .nav-links { display: flex; gap: 6px; }
  .nav-links a { color: var(--amber); text-decoration: none; font-weight: 700; font-size: 0.85rem; padding: 7px 14px; border-radius: 18px; transition: all 0.2s; border: 1px solid transparent; }
  .nav-links a:hover { border-color: var(--amber); background: rgba(255,179,71,0.1); }
  .nav-links a.active { background: rgba(255,107,26,0.2); border-color: var(--orange); color: var(--gold); }

  main { max-width: 900px; margin: 0 auto; padding: 50px 20px; position: relative; z-index: 1; }

  .page-header { text-align: center; margin-bottom: 50px; }
  .page-header h1 { font-family: 'Cinzel Decorative', serif; font-size: clamp(2rem,5vw,3rem); color: var(--orange); text-shadow: 0 0 30px var(--glow); margin-bottom: 10px; }
  .page-header p { color: var(--amber); font-size: 1rem; font-weight: 600; }

  /* PODIUM */
  .podium { display: flex; align-items: flex-end; justify-content: center; gap: 16px; margin-bottom: 50px; }
  .podium-slot { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .podium-block {
    border-radius: 12px 12px 0 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.8rem;
    font-weight: 900;
    width: 110px;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.4);
    transition: all 0.3s;
  }
  .podium-block:hover { transform: translateY(-4px); }
  .p1 .podium-block { height: 140px; background: linear-gradient(180deg, #FFD700, #CC9900); color: #3D2200; border: 2px solid #FFD700; box-shadow: 0 0 30px rgba(255,215,0,0.4); }
  .p2 .podium-block { height: 100px; background: linear-gradient(180deg, #C0C0C0, #888); color: #222; border: 2px solid #C0C0C0; }
  .p3 .podium-block { height: 75px; background: linear-gradient(180deg, #CD7F32, #8B4513); color: #FFF3E0; border: 2px solid #CD7F32; }
  .podium-name { font-weight: 800; font-size: 0.9rem; color: var(--cream); }
  .podium-score { font-size: 0.75rem; color: var(--amber); font-weight: 700; }
  .podium-badge { font-size: 1.6rem; }

  /* TABLE */
  .lb-table { width: 100%; border-collapse: collapse; }
  .lb-table thead tr { border-bottom: 2px solid var(--orange); }
  .lb-table th { text-align: left; padding: 10px 14px; font-size: 0.75rem; color: var(--amber); text-transform: uppercase; letter-spacing: 1px; font-family: 'Cinzel Decorative', serif; }
  .lb-table tbody tr {
    border-bottom: 1px solid var(--bark);
    transition: all 0.2s;
    cursor: default;
  }
  .lb-table tbody tr:hover { background: rgba(255,107,26,0.06); }
  .lb-table td { padding: 12px 14px; font-size: 0.9rem; font-weight: 700; }
  .rank-cell { font-family: 'Cinzel Decorative', serif; font-size: 1.1rem; color: var(--mid); width: 50px; }
  .rank-1 { color: var(--gold) !important; }
  .rank-2 { color: #C0C0C0 !important; }
  .rank-3 { color: #CD7F32 !important; }
  .name-cell { color: var(--cream); display: flex; align-items: center; gap: 8px; }
  .score-cell { color: var(--gold); }
  .ps-cell { color: var(--amber); }
  .badge-cell { font-size: 1.1rem; }
  .prestige-cell { color: #CC88FF; }

  /* SEARCH */
  .search-bar {
    display: flex; gap: 12px; margin-bottom: 30px; align-items: center;
    background: var(--deep); border: 1px solid var(--bark); border-radius: 12px; padding: 8px 16px;
  }
  .search-bar input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--cream); font-family: 'Nunito', sans-serif; font-size: 0.9rem; font-weight: 600;
  }
  .search-bar input::placeholder { color: var(--mid); }
  .search-bar span { color: var(--mid); font-size: 1.1rem; }

  .filter-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .filter-tab { padding: 6px 16px; border-radius: 20px; border: 1px solid var(--bark); background: transparent; color: var(--amber); font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
  .filter-tab.active { background: var(--orange); border-color: var(--amber); color: var(--dark); }
  .filter-tab:hover:not(.active) { border-color: var(--amber); }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--mid); }
  .empty-state .e-icon { font-size: 4rem; margin-bottom: 16px; display: block; }
  .empty-state p { font-size: 0.9rem; }

  footer { background: var(--dark); border-top: 1px solid var(--bark); padding: 30px; text-align: center; }
  .footer-logo { font-family: 'Cinzel Decorative', serif; font-size: 1.3rem; color: var(--orange); text-decoration: none; display: block; margin-bottom: 10px; }
  .footer-links { display: flex; gap: 20px; justify-content: center; margin-bottom: 10px; }
  .footer-links a { color: var(--amber); text-decoration: none; font-size: 0.85rem; font-weight: 700; }
  .footer-links a:hover { color: var(--gold); }
  footer p { color: var(--mid); font-size: 0.78rem; }
</style>
</head>
<body>
<div class="stars"></div>

<nav>
  <a class="nav-logo" href="index.html">🦊 FoxClicker</a>
  <div class="nav-links">
    <a href="index.html">Accueil</a>
    <a href="game.html">▶ Jeu</a>
    <a href="leaderboard.html" class="active">🏆 Classement</a>
    <a href="about.html">À propos</a>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1>🏆 Classement</h1>
    <p>Les plus grands Seigneurs Renards de la forêt</p>
  </div>

  <!-- PODIUM -->
  <div class="podium" id="podium"></div>

  <!-- FILTERS -->
  <div class="filter-tabs">
    <button class="filter-tab active" onclick="setFilter('all',this)">🌐 Tous</button>
    <button class="filter-tab" onclick="setFilter('prestige',this)">🌙 Prestiges</button>
    <button class="filter-tab" onclick="setFilter('clicks',this)">🖱️ Clics</button>
  </div>

  <!-- SEARCH -->
  <div class="search-bar">
    <span>🔍</span>
    <input type="text" placeholder="Rechercher un joueur..." oninput="filterSearch(this.value)" />
  </div>

  <!-- TABLE -->
  <table class="lb-table">
    <thead>
      <tr>
        <th>#</th>
        <th>Joueur</th>
        <th>🫐 Baies totales</th>
        <th>⚡ /sec</th>
        <th>🌀 Prestiges</th>
        <th>Badge</th>
      </tr>
    </thead>
    <tbody id="lb-body"></tbody>
  </table>
</main>

<footer>
  <a class="footer-logo" href="index.html">🦊 FoxClicker</a>
  <div class="footer-links">
    <a href="index.html">Accueil</a>
    <a href="game.html">Jouer</a>
    <a href="leaderboard.html">Classement</a>
    <a href="about.html">À propos</a>
  </div>
  <p>Fait avec ❤️ et beaucoup de myrtilles 🫐</p>
</footer>

<script>
// Simulated leaderboard data (in a real app, this would come from a backend)
const PLAYERS = [
  {name:'🦊 RenardRoi',    total:8450000000, ps:125000, prestiges:12, clicks:84200, badge:'👑'},
  {name:'🌙 LuneNoire',    total:3200000000, ps:48000,  prestiges:8,  clicks:52100, badge:'🌙'},
  {name:'🌲 ForêtSombre',  total:1850000000, ps:28000,  prestiges:6,  clicks:39800, badge:'🌲'},
  {name:'⚡ VitesseMax',   total:920000000,  ps:15000,  prestiges:4,  clicks:95600, badge:'⚡'},
  {name:'💎 CristalPur',   total:650000000,  ps:9800,   prestiges:3,  clicks:28400, badge:'💎'},
  {name:'🔮 MageRenard',   total:420000000,  ps:6200,   prestiges:2,  clicks:18900, badge:'🔮'},
  {name:'🌸 FleurPrairie', total:280000000,  ps:4100,   prestiges:2,  clicks:31200, badge:'🌸'},
  {name:'🏹 ChasseurNuit', total:195000000,  ps:2800,   prestiges:1,  clicks:44500, badge:'🏹'},
  {name:'🦝 RatonMalin',   total:120000000,  ps:1750,   prestiges:1,  clicks:22100, badge:'🦝'},
  {name:'🌿 HerbeFolle',   total:85000000,   ps:1200,   prestiges:1,  clicks:16800, badge:'🌿'},
  {name:'💧 RuisseauVif',  total:52000000,   ps:780,    prestiges:0,  clicks:38700, badge:'💧'},
  {name:'🕳️ TaupeFox',    total:31000000,   ps:450,    prestiges:0,  clicks:28900, badge:'🕳️'},
  {name:'🌕 LuneDouce',    total:18500000,   ps:280,    prestiges:0,  clicks:19200, badge:'🌕'},
  {name:'🍃 FeuilleMorte', total:9200000,    ps:140,    prestiges:0,  clicks:11400, badge:'🍃'},
  {name:'🐾 PetitePatte',  total:4100000,    ps:62,     prestiges:0,  clicks:8900,  badge:'🐾'},
];

function fmt(n){
  if(n>=1e12)return(n/1e12).toFixed(2)+'T';
  if(n>=1e9)return(n/1e9).toFixed(2)+'G';
  if(n>=1e6)return(n/1e6).toFixed(2)+'M';
  if(n>=1e3)return(n/1e3).toFixed(1)+'k';
  return Math.floor(n).toString();
}

let currentFilter = 'all';
let searchQuery = '';

function getSorted(){
  let data = [...PLAYERS];
  if(currentFilter==='prestige') data.sort((a,b)=>b.prestiges-a.prestiges||b.total-a.total);
  else if(currentFilter==='clicks') data.sort((a,b)=>b.clicks-a.clicks);
  if(searchQuery) data = data.filter(p=>p.name.toLowerCase().includes(searchQuery.toLowerCase()));
  return data;
}

function renderPodium(){
  const top = PLAYERS.slice(0,3);
  const order = [top[1], top[0], top[2]]; // 2nd, 1st, 3rd
  const ranks = [2,1,3];
  const container = document.getElementById('podium');
  container.innerHTML = order.map((p,i)=>`
    <div class="podium-slot p${ranks[i]}">
      <div class="podium-badge">${p.badge}</div>
      <div class="podium-name">${p.name}</div>
      <div class="podium-score">${fmt(p.total)} 🫐</div>
      <div class="podium-block">${ranks[i]}</div>
    </div>`).join('');
}

function renderTable(){
  const data = getSorted();
  const tbody = document.getElementById('lb-body');
  if(data.length===0){
    tbody.innerHTML=`<tr><td colspan="6"><div class="empty-state"><span class="e-icon">🔍</span><p>Aucun joueur trouvé</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = data.map((p,i)=>{
    const rank = PLAYERS.indexOf(p)+1;
    const rankClass = rank===1?'rank-1':rank===2?'rank-2':rank===3?'rank-3':'';
    return `<tr>
      <td class="rank-cell ${rankClass}">${rank}</td>
      <td><div class="name-cell">${p.name}</div></td>
      <td class="score-cell">${fmt(p.total)}</td>
      <td class="ps-cell">${fmt(p.ps)}</td>
      <td class="prestige-cell">${p.prestiges > 0 ? '🌙'.repeat(Math.min(p.prestiges,5))+' '+p.prestiges : '—'}</td>
      <td class="badge-cell">${p.badge}</td>
    </tr>`;
  }).join('');
}

function setFilter(f, btn){
  currentFilter=f;
  document.querySelectorAll('.filter-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}
function filterSearch(q){
  searchQuery=q;
  renderTable();
}

renderPodium();
renderTable();
</script>
</body>
</html>
