<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦊 FoxClicker — Jouer</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #FF6B1A;
    --amber: #FFB347;
    --dark: #0D0800;
    --deep: #1A0F00;
    --bark: #3D2200;
    --mid: #5C3300;
    --leaf: #2E4A1E;
    --leaf2: #3D6328;
    --gold: #FFD700;
    --cream: #FFF3E0;
    --text: #FFE0B2;
    --glow: rgba(255,107,26,0.6);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--dark);
    font-family: 'Nunito', sans-serif;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    background-image: radial-gradient(ellipse at 20% 0%, rgba(255,107,26,0.08) 0%, transparent 50%);
  }
  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px;
    background: rgba(13,8,0,0.95);
    border-bottom: 2px solid var(--orange);
    box-shadow: 0 2px 20px var(--glow);
    position: sticky; top: 0; z-index: 100;
  }
  .nav-logo { font-family: 'Cinzel Decorative', serif; font-size: 1.2rem; color: var(--orange); text-decoration: none; text-shadow: 0 0 15px var(--glow); }
  .nav-links { display: flex; gap: 4px; }
  .nav-links a { color: var(--amber); text-decoration: none; font-weight: 700; font-size: 0.8rem; padding: 6px 12px; border-radius: 16px; transition: all 0.2s; border: 1px solid transparent; }
  .nav-links a:hover { border-color: var(--amber); background: rgba(255,179,71,0.1); }
  .nav-links a.active { background: rgba(255,107,26,0.2); border-color: var(--orange); color: var(--gold); }
  .header-stats { display: flex; gap: 14px; font-size: 0.8rem; font-weight: 700; color: var(--amber); }
  .header-stats span { display: flex; align-items: center; gap: 3px; }

  .game-layout {
    display: grid;
    grid-template-columns: 250px 1fr 270px;
    height: calc(100vh - 52px);
  }

  .panel {
    background: linear-gradient(180deg, var(--deep), var(--dark));
    border-right: 1px solid var(--bark);
    overflow-y: auto;
    padding: 10px;
  }
  .panel:last-child { border-right: none; border-left: 1px solid var(--bark); }
  .panel h2 {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.75rem;
    color: var(--amber);
    letter-spacing: 2px;
    padding: 6px 0 10px;
    border-bottom: 1px solid var(--bark);
    margin-bottom: 8px;
  }
  .panel::-webkit-scrollbar { width: 3px; }
  .panel::-webkit-scrollbar-thumb { background: var(--mid); border-radius: 2px; }

  .center {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px;
    background: radial-gradient(ellipse at center, var(--deep) 0%, var(--dark) 70%);
    position: relative; overflow: hidden;
  }
  .forest-bg {
    position: absolute; bottom: 0; left: 0; right: 0; height: 110px;
    background: linear-gradient(180deg, transparent, var(--leaf) 60%, var(--leaf2));
    clip-path: polygon(0 60%,5% 40%,10% 55%,15% 30%,20% 50%,25% 20%,30% 45%,35% 15%,40% 40%,45% 25%,50% 50%,55% 20%,60% 45%,65% 10%,70% 35%,75% 20%,80% 40%,85% 25%,90% 50%,95% 30%,100% 55%,100% 100%,0 100%);
    opacity: 0.45;
  }
  .moon { position: absolute; top: 20px; right: 40px; font-size: 2.5rem; opacity: 0.25; animation: moonFloat 6s ease-in-out infinite; }
  @keyframes moonFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

  .berry-count {
    font-family: 'Cinzel Decorative', serif;
    font-size: 2rem;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(255,215,0,0.5);
    text-align: center; line-height: 1; z-index: 2;
  }
  .berry-count small { display:block; font-size:0.75rem; color:var(--amber); font-family:'Nunito',sans-serif; margin-top:3px; font-weight:700; }

  .fox-btn {
    width: 160px; height: 160px; border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #FF9043, #CC4400);
    border: 4px solid var(--amber);
    cursor: pointer; font-size: 80px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 30px var(--glow), 0 8px 30px rgba(0,0,0,0.5), inset 0 -4px 10px rgba(0,0,0,0.3);
    transition: transform 0.08s, box-shadow 0.08s;
    user-select: none; -webkit-tap-highlight-color: transparent;
    position: relative; z-index: 2;
  }
  .fox-btn:hover { box-shadow: 0 0 50px var(--glow), 0 12px 40px rgba(0,0,0,0.5); }
  .fox-btn:active { transform: scale(0.92); }

  .per-click { color: var(--amber); font-size: 0.85rem; font-weight: 700; z-index:2; }

  .float-text {
    position: fixed; font-weight: 800; font-size: 1.1rem;
    color: var(--gold); text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    pointer-events: none; z-index: 999;
    animation: floatUp 0.9s ease-out forwards;
  }
  @keyframes floatUp { 0%{opacity:1;transform:translateY(0)scale(1)} 100%{opacity:0;transform:translateY(-65px)scale(1.2)} }

  .particle {
    position: fixed; pointer-events: none; z-index: 998; font-size: 1rem;
    animation: particleFly 0.75s ease-out forwards;
  }
  @keyframes particleFly {
    0%{opacity:1;transform:translate(0,0)scale(1)rotate(0deg)}
    100%{opacity:0;transform:translate(var(--dx),var(--dy))scale(0.2)rotate(360deg)}
  }

  .building {
    background: linear-gradient(135deg, var(--bark), var(--deep));
    border: 1px solid var(--mid);
    border-radius: 10px; padding: 8px 10px; margin-bottom: 6px;
    cursor: pointer; transition: all 0.2s;
    display: grid; grid-template-columns: auto 1fr auto; gap: 6px; align-items: center;
    position: relative; overflow: hidden;
  }
  .building:hover:not(.locked) { border-color: var(--amber); transform: translateX(2px); background: linear-gradient(135deg, var(--mid), var(--bark)); }
  .building.locked { opacity: 0.35; cursor: not-allowed; }
  .building.affordable { border-color: var(--orange); box-shadow: 0 0 8px rgba(255,107,26,0.3); }
  .building-icon { font-size: 1.6rem; }
  .building-info h3 { font-size: 0.78rem; font-weight: 800; color: var(--cream); }
  .building-info p { font-size: 0.68rem; color: var(--amber); }
  .building-count { font-size: 1.1rem; font-weight: 800; color: var(--orange); min-width: 26px; text-align: center; }
  .building-cost { font-size: 0.65rem; color: var(--gold); font-weight: 700; }

  .upgrade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
  .upgrade {
    background: linear-gradient(135deg, var(--bark), var(--deep));
    border: 1px solid var(--mid); border-radius: 8px;
    padding: 8px; cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .upgrade:hover:not(.locked):not(.bought) { border-color: var(--amber); transform: scale(1.03); }
  .upgrade.bought { opacity: 0.3; cursor: default; border-color: var(--leaf2); }
  .upgrade.locked { opacity: 0.2; cursor: not-allowed; }
  .upgrade.affordable { border-color: var(--orange); box-shadow: 0 0 8px rgba(255,107,26,0.3); }
  .upgrade-icon { font-size: 1.5rem; }
  .upgrade h3 { font-size: 0.68rem; font-weight: 800; color: var(--cream); margin: 2px 0; }
  .upgrade p { font-size: 0.6rem; color: var(--amber); line-height: 1.3; }
  .upgrade .cost { font-size: 0.62rem; color: var(--gold); font-weight: 700; margin-top: 2px; }

  .milestone { display:flex; align-items:center; gap:8px; padding:7px 9px; border-radius:8px; margin-bottom:5px; background:var(--bark); border:1px solid transparent; font-size:0.73rem; }
  .milestone.done { border-color:var(--gold); background:linear-gradient(135deg,#2a1800,#3d2800); }
  .milestone .m-icon { font-size:1.2rem; filter:grayscale(1)opacity(0.5); }
  .milestone.done .m-icon { filter:none; }
  .milestone h3 { font-size:0.72rem; font-weight:700; color:var(--cream); }
  .milestone p { color:var(--amber); font-size:0.62rem; }

  #toast-container { position:fixed; top:60px; right:14px; z-index:500; display:flex; flex-direction:column; gap:7px; }
  .toast {
    background: linear-gradient(135deg, var(--bark), var(--deep));
    border: 1px solid var(--amber); border-radius: 10px;
    padding: 9px 13px; font-size: 0.78rem; font-weight: 700; color: var(--cream);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
    max-width: 210px;
  }
  @keyframes toastIn { from{opacity:0;transform:translateX(25px)} to{opacity:1;transform:none} }
  @keyframes toastOut { to{opacity:0;transform:translateX(25px)} }

  .tabs { display:flex; gap:3px; margin-bottom:10px; }
  .tab-btn {
    flex:1; padding:5px; font-size:0.68rem; font-weight:800;
    background:var(--bark); border:1px solid var(--mid); border-radius:6px;
    color:var(--amber); cursor:pointer; transition:all 0.2s; font-family:'Nunito',sans-serif;
  }
  .tab-btn.active { background:var(--orange); border-color:var(--amber); color:var(--dark); }
  .tab-content { display:none; }
  .tab-content.active { display:block; }

  .prestige-btn {
    width:100%; padding:10px;
    background:linear-gradient(135deg,#4A0080,#7A00CC);
    border:2px solid #CC88FF; border-radius:10px;
    color:#EEC8FF; font-family:'Nunito',sans-serif;
    font-weight:800; font-size:0.8rem;
    cursor:pointer; transition:all 0.2s;
    box-shadow:0 0 20px rgba(120,0,200,0.4); margin-top:7px;
  }
  .prestige-btn:hover { transform:scale(1.02); box-shadow:0 0 30px rgba(120,0,200,0.6); }
  .prestige-info { font-size:0.68rem; color:#CC88FF; text-align:center; margin-top:5px; }
  .sep { border:none; border-top:1px solid var(--bark); margin:8px 0; }
  .stat-row { display:flex; justify-content:space-between; font-size:0.72rem; padding:3px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
  .stat-row span:last-child { color:var(--gold); font-weight:700; }

  @media(max-width:768px) {
    .game-layout { grid-template-columns:1fr; height:auto; }
    .panel { max-height:280px; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">🦊 FoxClicker</a>
  <div class="header-stats">
    <span>🫐 <span id="h-total">0</span></span>
    <span>⚡ <span id="h-ps">0</span>/s</span>
    <span>🌀 <span id="h-prestige">0</span></span>
  </div>
  <div class="nav-links">
    <a href="index.html">Accueil</a>
    <a href="game.html" class="active">▶ Jeu</a>
    <a href="leaderboard.html">🏆 Classement</a>
    <a href="about.html">À propos</a>
  </div>
</nav>

<div class="game-layout">
  <div class="panel">
    <h2>🌲 TANIÈRES</h2>
    <div id="buildings-container"></div>
  </div>

  <div class="center">
    <div class="moon">🌙</div>
    <div class="berry-count" id="berry-display">0<small>🫐 myrtilles</small></div>
    <div class="per-click" id="per-click-display">+1 par clic</div>
    <div class="fox-btn" id="fox-btn" onclick="clickFox(event)">🦊</div>
    <div style="font-size:0.72rem;color:var(--mid);font-weight:600;z-index:2">Clique pour récolter !</div>
    <div class="forest-bg"></div>
  </div>

  <div class="panel">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('upgrades',this)">✨ Amélios</button>
      <button class="tab-btn" onclick="switchTab('stats',this)">📊 Stats</button>
      <button class="tab-btn" onclick="switchTab('achiev',this)">🏅 Trophées</button>
    </div>
    <div class="tab-content active" id="tab-upgrades">
      <div class="upgrade-grid" id="upgrades-container"></div>
    </div>
    <div class="tab-content" id="tab-stats">
      <div id="stats-container"></div>
      <hr class="sep">
      <p style="font-size:0.72rem;color:#CC88FF;margin-bottom:6px;">Resets tout mais gagne des 💎 <b>Cristaux de Lune</b> permanents !</p>
      <button class="prestige-btn" onclick="tryPrestige()">🌙 Prestige (<span id="prestige-gain">0</span> 💎)</button>
      <div class="prestige-info">💎 <span id="crystal-display">0</span> cristaux · ×<span id="crystal-mult">1.00</span></div>
    </div>
    <div class="tab-content" id="tab-achiev">
      <div id="achiev-container"></div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
let G = {
  berries:0, totalBerries:0, clickCount:0,
  perSecond:0, perClick:1,
  crystals:0, prestiges:0, crystalMult:1,
  startTime:Date.now(),
};

const BUILDINGS = [
  {id:'burrow',   name:'Terrier',        icon:'🕳️', desc:'Creuse et stocke.',              base:15,     ps:0.1,  owned:0},
  {id:'bush',     name:'Buisson',        icon:'🌿', desc:'Se cache pour observer.',         base:100,    ps:0.5,  owned:0},
  {id:'stream',   name:'Ruisseau',       icon:'💧', desc:'Pêche des poissons.',             base:500,    ps:2,    owned:0},
  {id:'forest',   name:'Forêt dense',    icon:'🌲', desc:'Territoire de chasse.',           base:2500,   ps:8,    owned:0},
  {id:'meadow',   name:'Prairie',        icon:'🌸', desc:'Terrain de jeu infini.',          base:12000,  ps:30,   owned:0},
  {id:'den',      name:'Grande tanière', icon:'🦝', desc:'Famille de renards.',             base:60000,  ps:100,  owned:0},
  {id:'moonhill', name:'Colline lunaire',icon:'🌙', desc:'Magie nocturne.',                 base:300000, ps:400,  owned:0},
  {id:'foxlord',  name:'Seigneur renard',icon:'👑', desc:'Roi de la forêt.',                base:1500000,ps:1500, owned:0},
];

const UPGRADES = [
  {id:'u1', name:'Griffes acérées', icon:'🐾', desc:'×2 clics',        cost:100,    type:'click',    mult:2,   req:null,  bought:false},
  {id:'u2', name:'Flair affûté',    icon:'👃', desc:'Terrier ×2',       cost:500,    type:'building', bid:'burrow',  mult:2, req:null, bought:false},
  {id:'u3', name:'Queue touffue',   icon:'🦊', desc:'×3 clics',         cost:2000,   type:'click',    mult:3,   req:'u1',  bought:false},
  {id:'u4', name:'Fourrure épaisse',icon:'🧣', desc:'Buisson ×2',       cost:5000,   type:'building', bid:'bush',    mult:2, req:'u2', bought:false},
  {id:'u5', name:'Hurlements',      icon:'🌕', desc:'Ruisseau ×3',      cost:15000,  type:'building', bid:'stream',  mult:3, req:null, bought:false},
  {id:'u6', name:'Esprit renard',   icon:'🔮', desc:'×5 clics',         cost:50000,  type:'click',    mult:5,   req:'u3',  bought:false},
  {id:'u7', name:'Arbres alliés',   icon:'🌳', desc:'Forêt ×2',         cost:100000, type:'building', bid:'forest',  mult:2, req:null, bought:false},
  {id:'u8', name:'Ruse suprême',    icon:'🎭', desc:'Tous ×1.5',        cost:500000, type:'all',      mult:1.5, req:'u6',  bought:false},
  {id:'u9', name:'Lune de sang',    icon:'🌑', desc:'Colline ×3',       cost:1000000,type:'building', bid:'moonhill',mult:3, req:null, bought:false},
  {id:'u10',name:'Légende',         icon:'📖', desc:'×10 clics',        cost:5000000,type:'click',    mult:10,  req:'u8',  bought:false},
];

const ACHIEVEMENTS = [
  {id:'a1', name:'Premiers pas',   icon:'👣', desc:'100 baies récoltées',   check:()=>G.totalBerries>=100},
  {id:'a2', name:'Apprenti',       icon:'🌱', desc:'1 000 baies récoltées', check:()=>G.totalBerries>=1000},
  {id:'a3', name:'Chasseur',       icon:'🏹', desc:'10 000 baies',          check:()=>G.totalBerries>=10000},
  {id:'a4', name:'Renard agile',   icon:'💨', desc:'100 clics',             check:()=>G.clickCount>=100},
  {id:'a5', name:'Cliqueur fou',   icon:'🖱️',desc:'1 000 clics',           check:()=>G.clickCount>=1000},
  {id:'a6', name:'Terrier master', icon:'🕳️',desc:'10 terriers',           check:()=>getBldg('burrow').owned>=10},
  {id:'a7', name:'Forestier',      icon:'🌲', desc:'10 forêts',             check:()=>getBldg('forest').owned>=10},
  {id:'a8', name:'Millionnaire',   icon:'💰', desc:'1M baies récoltées',    check:()=>G.totalBerries>=1000000},
  {id:'a9', name:'Première nuit',  icon:'🌙', desc:'1er prestige',          check:()=>G.prestiges>=1},
  {id:'a10',name:'Légende',        icon:'⭐', desc:'100M baies récoltées',  check:()=>G.totalBerries>=100000000},
];

function getBldg(id){return BUILDINGS.find(b=>b.id===id);}
function getUpg(id){return UPGRADES.find(u=>u.id===id);}
function fmt(n){
  if(n>=1e12)return(n/1e12).toFixed(2)+'T';
  if(n>=1e9)return(n/1e9).toFixed(2)+'G';
  if(n>=1e6)return(n/1e6).toFixed(2)+'M';
  if(n>=1e3)return(n/1e3).toFixed(1)+'k';
  return Math.floor(n).toString();
}
function bldgCost(b){return Math.floor(b.base*Math.pow(1.15,b.owned));}

function calcPerClick(){
  let base=1;
  UPGRADES.forEach(u=>{if(u.bought&&u.type==='click')base*=u.mult;});
  UPGRADES.forEach(u=>{if(u.bought&&u.type==='all')base*=u.mult;});
  return base*G.crystalMult;
}
function calcPerSecond(){
  let total=0;
  BUILDINGS.forEach(b=>{
    let ps=b.ps*b.owned;
    UPGRADES.forEach(u=>{if(u.bought&&u.type==='building'&&u.bid===b.id)ps*=u.mult;});
    UPGRADES.forEach(u=>{if(u.bought&&u.type==='all')ps*=u.mult;});
    total+=ps;
  });
  return total*G.crystalMult;
}

function clickFox(e){
  const gain=G.perClick;
  G.berries+=gain; G.totalBerries+=gain; G.clickCount++;
  const el=document.createElement('div');
  el.className='float-text';
  el.textContent='+'+fmt(gain)+'🫐';
  el.style.left=(e.clientX-20)+'px';
  el.style.top=(e.clientY-10)+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),900);
  if(Math.random()<0.4)spawnParticles(e.clientX,e.clientY);
  checkAchievements();
}
function spawnParticles(x,y){
  const em=['🫐','🍃','✨','🦊','🌿'];
  for(let i=0;i<3;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.textContent=em[Math.floor(Math.random()*em.length)];
    p.style.left=x+'px'; p.style.top=y+'px';
    const a=Math.random()*Math.PI*2,d=40+Math.random()*60;
    p.style.setProperty('--dx',Math.cos(a)*d+'px');
    p.style.setProperty('--dy',Math.sin(a)*d-30+'px');
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),800);
  }
}

function buyBuilding(id){
  const b=getBldg(id),cost=bldgCost(b);
  if(G.berries<cost)return;
  G.berries-=cost; b.owned++;
  recalc(); renderBuildings(); renderUpgrades(); checkAchievements();
  toast(`${b.icon} ${b.name} acheté ! (×${b.owned})`);
}
function buyUpgrade(id){
  const u=getUpg(id);
  if(u.bought||G.berries<u.cost)return;
  if(u.req&&!getUpg(u.req)?.bought)return;
  G.berries-=u.cost; u.bought=true;
  recalc(); renderUpgrades();
  toast(`✨ ${u.name} débloqué !`);
}
function crystalGain(){return Math.floor(Math.sqrt(G.totalBerries/1e6));}
function tryPrestige(){
  const gain=crystalGain();
  if(gain<1){toast('❌ Trop tôt ! (besoin de 1M baies totales)');return;}
  if(!confirm(`Prestige ? Tu obtiens ${gain} 💎 cristaux de lune.\nTout sera remis à zéro !`))return;
  G.crystals+=gain; G.prestiges++;
  G.crystalMult=1+G.crystals*0.1;
  G.berries=0; G.totalBerries=0; G.clickCount=0;
  BUILDINGS.forEach(b=>b.owned=0);
  UPGRADES.forEach(u=>u.bought=false);
  recalc(); render();
  toast(`🌙 Prestige ! +${gain} 💎 cristaux. Bonus ×${G.crystalMult.toFixed(2)}`);
}
function recalc(){G.perClick=calcPerClick();G.perSecond=calcPerSecond();}

function renderBuildings(){
  const c=document.getElementById('buildings-container');
  c.innerHTML='';
  BUILDINGS.forEach(b=>{
    const cost=bldgCost(b),affordable=G.berries>=cost;
    const el=document.createElement('div');
    el.className='building'+(affordable?' affordable':'');
    el.innerHTML=`<div class="building-icon">${b.icon}</div><div class="building-info"><h3>${b.name}</h3><p>${b.desc}</p><div class="building-cost">🫐${fmt(cost)}</div></div><div class="building-count">${b.owned}</div>`;
    el.onclick=()=>buyBuilding(b.id);
    c.appendChild(el);
  });
}
function renderUpgrades(){
  const c=document.getElementById('upgrades-container');
  c.innerHTML='';
  UPGRADES.forEach(u=>{
    const locked=u.req&&!getUpg(u.req)?.bought;
    const affordable=G.berries>=u.cost&&!locked;
    const el=document.createElement('div');
    el.className='upgrade'+(u.bought?' bought':'')+(locked?' locked':'')+((!u.bought&&affordable)?' affordable':'');
    el.innerHTML=`<div class="upgrade-icon">${u.icon}</div><h3>${u.name}</h3><p>${u.desc}</p><div class="cost">${u.bought?'✓':'🫐'+fmt(u.cost)}</div>`;
    if(!u.bought&&!locked)el.onclick=()=>buyUpgrade(u.id);
    c.appendChild(el);
  });
}
function renderStats(){
  const el=document.getElementById('stats-container');
  const elapsed=Math.floor((Date.now()-G.startTime)/1000);
  el.innerHTML=`
    <div class="stat-row"><span>🫐 Actuelles</span><span>${fmt(G.berries)}</span></div>
    <div class="stat-row"><span>📦 Total</span><span>${fmt(G.totalBerries)}</span></div>
    <div class="stat-row"><span>⚡ /seconde</span><span>${fmt(G.perSecond)}</span></div>
    <div class="stat-row"><span>🖱️ /clic</span><span>${fmt(G.perClick)}</span></div>
    <div class="stat-row"><span>🖱️ Clics</span><span>${fmt(G.clickCount)}</span></div>
    <div class="stat-row"><span>⏱️ Temps</span><span>${Math.floor(elapsed/60)}m ${elapsed%60}s</span></div>
    <div class="stat-row"><span>🌀 Prestiges</span><span>${G.prestiges}</span></div>
    <div class="stat-row"><span>💎 Cristaux</span><span>${G.crystals}</span></div>`;
  document.getElementById('prestige-gain').textContent=crystalGain();
  document.getElementById('crystal-display').textContent=G.crystals;
  document.getElementById('crystal-mult').textContent=G.crystalMult.toFixed(2);
}
function renderAchievements(){
  const c=document.getElementById('achiev-container');
  c.innerHTML='';
  ACHIEVEMENTS.forEach(a=>{
    const done=a.check();
    const el=document.createElement('div');
    el.className='milestone'+(done?' done':'');
    el.innerHTML=`<div class="m-icon">${a.icon}</div><div><h3>${a.name}</h3><p>${a.desc}</p></div>`;
    c.appendChild(el);
  });
}
function renderHeader(){
  document.getElementById('h-total').textContent=fmt(G.totalBerries);
  document.getElementById('h-ps').textContent=fmt(G.perSecond);
  document.getElementById('h-prestige').textContent=G.prestiges;
}
function renderMain(){
  document.getElementById('berry-display').innerHTML=fmt(G.berries)+'<small>🫐 myrtilles</small>';
  document.getElementById('per-click-display').textContent=`+${fmt(G.perClick)} par clic`;
}
function render(){renderMain();renderHeader();renderBuildings();renderUpgrades();renderStats();renderAchievements();}

const _aShown=new Set();
function checkAchievements(){
  ACHIEVEMENTS.forEach(a=>{
    if(!_aShown.has(a.id)&&a.check()){_aShown.add(a.id);toast(`🏅 ${a.name} ! ${a.icon}`);}
  });
}
function switchTab(name,btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='stats')renderStats();
  if(name==='achiev')renderAchievements();
}
function toast(msg){
  const c=document.getElementById('toast-container');
  const el=document.createElement('div');
  el.className='toast'; el.textContent=msg;
  c.appendChild(el);
  setTimeout(()=>el.remove(),2800);
}

let lastTick=Date.now();
function gameLoop(){
  const now=Date.now(),dt=(now-lastTick)/1000; lastTick=now;
  const gain=G.perSecond*dt;
  if(gain>0){G.berries+=gain;G.totalBerries+=gain;}
  renderMain(); renderHeader();
  document.querySelectorAll('.building').forEach((el,i)=>{
    const b=BUILDINGS[i];
    el.classList.toggle('affordable',G.berries>=bldgCost(b));
  });
  document.querySelectorAll('.upgrade').forEach((el,i)=>{
    const u=UPGRADES[i];
    const locked=u.req&&!getUpg(u.req)?.bought;
    el.classList.toggle('affordable',!u.bought&&!locked&&G.berries>=u.cost);
  });
  requestAnimationFrame(gameLoop);
}

recalc(); render(); gameLoop();
toast('🦊 Bienvenue ! Clique sur le renard pour commencer !');
</script>
</body>
</html>
