<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦊 Fox Arena — Compte</title>

<style>
body{
  background:#0A0500;
  color:#FFE0B2;
  font-family:Arial;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.card{
  background:#140900;
  padding:30px;
  border-radius:15px;
  width:300px;
  text-align:center;
  border:1px solid #FF6B1A;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

button{
  background:#FF6B1A;
  color:white;
  border:none;
  padding:12px;
  width:100%;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:0.8;
}
</style>
</head>

<body>

<div class="card">
  <h2>Créer un compte</h2>

  <input id="username" placeholder="Pseudo">
  <input id="password" type="password" placeholder="Mot de passe">

  <button onclick="register()">S'inscrire</button>
  <button onclick="login()">Se connecter</button>

  <p id="msg"></p>
</div>

<script>
function register(){
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  if(!user || !pass){
    msg("Remplis tous les champs");
    return;
  }

  localStorage.setItem("user_"+user, JSON.stringify({
    password: pass,
    bestScore: 0,
    totalKills: 0
  }));

  msg("Compte créé !");
}

function login(){
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  const data = JSON.parse(localStorage.getItem("user_"+user));

  if(!data || data.password !== pass){
    msg("Erreur de connexion");
    return;
  }

  localStorage.setItem("currentUser", user);
  msg("Connecté !");
  
  setTimeout(()=>window.location.href="index.html",1000);
}

function msg(t){
  document.getElementById("msg").innerText = t;
}
</script>

</body>
</html>
